name: ETF Analyst Report

on:
  workflow_dispatch:
  schedule:
    # 7 PM Toronto during daylight saving time = 23:00 UTC
    - cron: "0 23 * * 1-5"

permissions:
  contents: write

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests yfinance beautifulsoup4 XlsxWriter openpyxl lxml html5lib pypdf playwright
          python -m playwright install --with-deps chromium

      - name: Run ETF analyst report
        run: python etf_analyst_report_complete.py

      - name: Send ETF report email
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 465
          SMTP_USER: pianissix7mo@gmail.com
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: pianissix7mo@gmail.com
          EMAIL_TO: mofeiwang@hotmail.com,mofeiwang@yahoo.ca
        run: python send_etf_report_email.py

      - name: Commit PE history and latest report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add etf_analyst_target_outputs/ETF_PE_history.xlsx

          git commit -m "Update ETF PE history and report" || echo "No report changes to commit"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ETF-analyst-report
          path: |
            etf_analyst_target_outputs/ETF_analyst_report.xlsx
            etf_analyst_target_outputs/ETF_PE_history.xlsx
            etf_analyst_target_outputs/ETF_analyst_report_*.xlsx
          retention-days: 30
