name: ETF Analyst Report

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions uses UTC.
    # 00:00 UTC Tue-Sat is approximately 7 PM Toronto Mon-Fri during EST.
    # During daylight saving time, it is approximately 8 PM Toronto Mon-Fri.
    - cron: "0 0 * * 2-6"

permissions:
  contents: write

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests yfinance beautifulsoup4 XlsxWriter openpyxl lxml html5lib pypdf playwright
          python -m playwright install --with-deps chromium

      - name: Run ETF analyst report
        run: python etf_analyst_report_pe_history_graphs_v4.py

      - name: Commit PE history and latest report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add etf_analyst_target_outputs/ETF_PE_history.xlsx
          git add etf_analyst_target_outputs/ETF_analyst_report.xlsx

          git commit -m "Update ETF PE history and report" || echo "No report changes to commit"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ETF-analyst-report
          path: |
            etf_analyst_target_outputs/ETF_analyst_report.xlsx
            etf_analyst_target_outputs/ETF_PE_history.xlsx
          retention-days: 30
